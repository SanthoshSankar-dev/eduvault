<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduVault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <!-- Login Form Card -->
        <div class="login-card" id="loginCardView">
            <div class="login-header">
                <div class="login-logo-box">📖</div>
                <h1>EduVault</h1>
                <p>College Notes Portal</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        placeholder="you@college.edu"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div id="loginError" class="error-message"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                </div>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="#" onclick="toggleForms(); return false;">Create one</a></p>
            </div>
        </div>

        <!-- Registration Form Card -->
        <div class="login-card" id="registerCardView" style="display: none;">
            <div class="login-header">
                <div class="login-logo-box">📖</div>
                <h1>Create Account</h1>
                <p>Join EduVault Today</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input 
                        type="text" 
                        id="regName" 
                        name="name"
                        placeholder="John Doe"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="regEmail" 
                        name="email"
                        placeholder="you@college.edu"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="regDepartment">Department</label>
                    <select id="regDepartment" name="department">
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Science">Science</option>
                        <option value="Arts">Arts</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Medical">Medical</option>
                        <option value="Law">Law</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="regSemester">Semester</label>
                    <select id="regSemester" name="semester">
                        <option value="">Select Semester</option>
                        <option value="1st Semester">1st Semester</option>
                        <option value="2nd Semester">2nd Semester</option>
                        <option value="3rd Semester">3rd Semester</option>
                        <option value="4th Semester">4th Semester</option>
                        <option value="5th Semester">5th Semester</option>
                        <option value="6th Semester">6th Semester</option>
                        <option value="7th Semester">7th Semester</option>
                        <option value="8th Semester">8th Semester</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input 
                        type="password" 
                        id="regPassword" 
                        name="password"
                        placeholder="Minimum 6 characters"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="regConfirmPassword" 
                        name="confirmPassword"
                        placeholder="Confirm password"
                        required
                    >
                </div>

                <div id="registerError" class="error-message"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                </div>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="#" onclick="toggleForms(); return false;">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        function toggleForms() {
            const loginView = document.getElementById('loginCardView');
            const registerView = document.getElementById('registerCardView');
            
            loginView.style.display = loginView.style.display === 'none' ? 'block' : 'none';
            registerView.style.display = registerView.style.display === 'none' ? 'block' : 'none';
            
            document.getElementById('loginForm').reset();
            document.getElementById('registerForm').reset();
            document.getElementById('loginError').textContent = '';
            document.getElementById('registerError').textContent = '';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    showNotification('Welcome back, ' + data.name + '!', 'success');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                }
            } catch (error) {
                errorDiv.textContent = 'Network error';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('registerError');
            const form = document.getElementById('registerForm');
            const formData = new FormData(form);

            if (formData.get('password') !== formData.get('confirmPassword')) {
                errorDiv.textContent = 'Passwords do not match';
                return;
            }

            if (formData.get('password').length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: formData.get('name'),
                        email: formData.get('email'),
                        password: formData.get('password'),
                        department: formData.get('department'),
                        semester: formData.get('semester')
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    showNotification('Account created! Please login.', 'success');
                    setTimeout(() => toggleForms(), 1000);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                }
            } catch (error) {
                errorDiv.textContent = 'Network error';
            }
        });

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => notification.remove(), 3000);
        }
    </script>
    
    <style>
        .error-message {
            color: var(--danger-color);
            padding: 0.75rem 1rem;
            background-color: #fee2e2;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            margin-top: 1rem;
            display: block;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            color: white;
            z-index: 1000;
            animation: slideIn var(--transition-fast);
            box-shadow: var(--shadow-lg);
        }

        .notification-success {
            background-color: var(--success-color);
        }

        .notification-error {
            background-color: var(--danger-color);
        }

        .notification-info {
            background-color: var(--primary-color);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</body>
</html>
