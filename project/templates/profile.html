<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - EduVault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .profile-card {
            background: var(--card-background);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 2.5rem;
            border: 1px solid var(--border-subtle);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border-subtle);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 auto 1.5rem;
            box-shadow: 0 4px 15px rgba(30, 64, 175, 0.2);
        }

        .profile-header h1 {
            font-size: 1.75rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .profile-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 1rem;
            background-color: var(--input-background);
            color: var(--text-primary);
            transition: all var(--transition-base);
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1);
        }

        .form-group input:disabled {
            background-color: var(--light-gray);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid var(--border-subtle);
        }

        .btn-profile {
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
            flex: 1;
            max-width: 200px;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--primary-color), #1826d0);
            color: white;
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 64, 175, 0.4);
        }

        .btn-cancel {
            background: var(--light-gray);
            color: var(--text-primary);
            border: 2px solid var(--border-subtle);
        }

        .btn-cancel:hover {
            background: var(--border-subtle);
        }

        .profile-info {
            background: var(--light-gray);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .edit-toggle {
            text-align: center;
            margin-top: 1rem;
        }

        .edit-link {
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-base);
        }

        .edit-link:hover {
            color: #1826d0;
        }

        .profile-message {
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            display: none;
            animation: slideDown var(--transition-base);
        }

        .profile-message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .profile-message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .profile-card {
                padding: 1.5rem;
            }

            .profile-avatar {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }

            .profile-header h1 {
                font-size: 1.35rem;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn-profile {
                max-width: none;
            }
        }

        :root {
            --input-background: #f9fafb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --input-background: #1f2937;
            }

            .form-group input,
            .form-group select {
                background-color: var(--input-background);
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <div class="logo-box">📚</div>
                <h1>EduVault</h1>
            </div>
            
            <ul class="navbar-menu">
                <li><a href="/dashboard">Home</a></li>
                <li><a href="/upload-notes">Upload Notes</a></li>
                <li><a href="/view-notes">View Notes</a></li>
                <li><a href="/view-notes">Search Notes</a></li>
            </ul>

            <div class="navbar-right">
                <div class="navbar-user">
                    <a href="/profile" class="navbar-avatar" id="studentProfile">ST</a>
                    <div class="dropdown-menu">
                        <a href="/profile" class="dropdown-item">👤 Profile</a>
                        <a href="/dashboard" class="dropdown-item">🏠 Dashboard</a>
                        <a href="#" id="logoutLink" class="dropdown-item" style="color: #dc2626;">🚪 Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <!-- Message Alert -->
            <div id="profileMessage" class="profile-message"></div>

            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">ST</div>
                <h1 id="profileName">Student Name</h1>
                <p id="profileEmail">student@example.com</p>
            </div>

            <!-- View Mode -->
            <div id="viewMode">
                <div class="profile-info">
                    <div class="info-row">
                        <span class="info-label">Full Name</span>
                        <span class="info-value" id="viewName">Loading...</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Email</span>
                        <span class="info-value" id="viewEmail">Loading...</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Department</span>
                        <span class="info-value" id="viewDepartment">Not specified</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Semester</span>
                        <span class="info-value" id="viewSemester">Not specified</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Member Since</span>
                        <span class="info-value" id="viewJoinDate">Loading...</span>
                    </div>
                </div>
                <div class="edit-toggle">
                    <a class="edit-link" id="editBtn">✎ Edit Profile</a>
                </div>
            </div>

            <!-- Edit Mode -->
            <form id="editMode" style="display: none;">
                <div class="form-group">
                    <label for="editName">Full Name *</label>
                    <input type="text" id="editName" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="editEmail">Email</label>
                    <input type="email" id="editEmail" name="email" disabled placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="editDepartment">Department</label>
                    <select id="editDepartment" name="department">
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editSemester">Semester</label>
                    <select id="editSemester" name="semester">
                        <option value="">Select Semester</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-profile btn-save">Save Changes</button>
                    <button type="button" class="btn-profile btn-cancel" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Load profile data
        async function loadProfile() {
            try {
                const response = await fetch('/api/profile');
                if (!response.ok) throw new Error('Failed to load profile');
                
                const student = await response.json();
                
                // Update header
                document.getElementById('profileName').textContent = student.name;
                document.getElementById('profileEmail').textContent = student.email;
                document.getElementById('profileAvatar').textContent = getInitials(student.name);
                document.getElementById('studentProfile').textContent = getInitials(student.name);
                
                // Update view mode
                document.getElementById('viewName').textContent = student.name;
                document.getElementById('viewEmail').textContent = student.email;
                document.getElementById('viewDepartment').textContent = student.department || 'Not specified';
                document.getElementById('viewSemester').textContent = student.semester || 'Not specified';
                
                const joinDate = new Date(student.created_at).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                document.getElementById('viewJoinDate').textContent = joinDate;
                
                // Update edit form
                document.getElementById('editName').value = student.name;
                document.getElementById('editEmail').value = student.email;
                document.getElementById('editDepartment').value = student.department || '';
                document.getElementById('editSemester').value = student.semester || '';
                
            } catch (error) {
                console.error('Error loading profile:', error);
                showMessage('Error loading profile', 'error');
            }
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase();
        }

        // Toggle edit mode
        document.getElementById('editBtn').addEventListener('click', () => {
            document.getElementById('viewMode').style.display = 'none';
            document.getElementById('editMode').style.display = 'block';
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            document.getElementById('viewMode').style.display = 'block';
            document.getElementById('editMode').style.display = 'none';
        });

        // Handle form submission
        document.getElementById('editMode').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('editName').value,
                department: document.getElementById('editDepartment').value,
                semester: document.getElementById('editSemester').value
            };
            
            try {
                const response = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) throw new Error('Failed to update profile');
                
                showMessage('Profile updated successfully!', 'success');
                
                // Reload profile data
                await loadProfile();
                
                // Switch to view mode after 1 second
                setTimeout(() => {
                    document.getElementById('viewMode').style.display = 'block';
                    document.getElementById('editMode').style.display = 'none';
                }, 1000);
                
            } catch (error) {
                console.error('Error updating profile:', error);
                showMessage('Error updating profile. Please try again.', 'error');
            }
        });

        // Show message alert
        function showMessage(text, type) {
            const messageEl = document.getElementById('profileMessage');
            messageEl.textContent = text;
            messageEl.className = `profile-message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 4000);
        }

        // Logout functionality
        document.getElementById('logoutLink').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Logout error:', error);
            }
        });

        // Load profile on page load
        document.addEventListener('DOMContentLoaded', loadProfile);

        // Improved dropdown menu behavior
        const navbarUser = document.querySelector('.navbar-user');
        const dropdownMenu = document.querySelector('.dropdown-menu');
        let closeTimeout;

        if (navbarUser && dropdownMenu) {
            navbarUser.addEventListener('mouseenter', () => {
                clearTimeout(closeTimeout);
                dropdownMenu.style.display = 'block';
            });

            navbarUser.addEventListener('mouseleave', () => {
                closeTimeout = setTimeout(() => {
                    dropdownMenu.style.display = 'none';
                }, 100);
            });

            dropdownMenu.addEventListener('mouseenter', () => {
                clearTimeout(closeTimeout);
                dropdownMenu.style.display = 'block';
            });

            dropdownMenu.addEventListener('mouseleave', () => {
                closeTimeout = setTimeout(() => {
                    dropdownMenu.style.display = 'none';
                }, 100);
            });

            // Handle dropdown item clicks
            const dropdownItems = dropdownMenu.querySelectorAll('a');
            dropdownItems.forEach(item => {
                item.addEventListener('click', () => {
                    dropdownMenu.style.display = 'none';
                });
            });
        }
    </script>
</body>
</html>
